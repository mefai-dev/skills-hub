name: Enrich Skill Metadata

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "skills/**-metadata.json"
  # Fallback for fork PRs: the commit-back step is skipped during the PR
  # (GitHub blocks write access to forks), so we re-enrich on merge instead.
  push:
    branches: [main]
    paths:
      - "skills/**-metadata.json"

jobs:
  enrich:
    name: Enrich & Validate Skills
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit enriched files back to the PR branch
      pull-requests: write  # needed to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For pull_request: checks out the PR head commit (works for both fork and same-repo).
          # For push: checks out the pushed commit on main.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------------------------------------------------
      # Detect which *-metadata.json files were added or changed.
      # For PRs: diff base sha vs head sha — works for fork and same-repo PRs
      #          regardless of what the branch is named.
      # For push: diff HEAD~1 vs HEAD.
      # Result written to a temp file — never interpolated into shell or JS.
      # -----------------------------------------------------------------------
      - name: Detect changed skill files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
              | grep 'skills/.*-metadata\.json' || true)
          else
            FILES=$(git diff --name-only HEAD~1 HEAD \
              | grep 'skills/.*-metadata\.json' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No skill submission files changed."
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$FILES"
            echo "$FILES" > /tmp/changed-skills.txt
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Run enrichment script — writes results back into each submission file.
      # -----------------------------------------------------------------------
      - name: Enrich skill metadata
        id: enrich
        if: steps.changed.outputs.any == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTGUARD_API_KEY: ${{ secrets.AGENTGUARD_API_KEY }}
        run: |
          while IFS= read -r file; do
            echo "::group::Processing $file"
            node scripts/enrich-skill.js "$file"
            echo "::endgroup::"
          done < /tmp/changed-skills.txt

      # -----------------------------------------------------------------------
      # Same-repo PR: commit enriched files back to the PR branch.
      # -----------------------------------------------------------------------
      - name: Commit enriched files to PR branch
        if: steps.changed.outputs.any == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to the actual PR branch so we can push
          git fetch origin ${{ github.event.pull_request.head.ref }}
          git checkout ${{ github.event.pull_request.head.ref }}

          while IFS= read -r file; do
            git add "$file"
          done < /tmp/changed-skills.txt

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          NAMES=$(awk -F'/' '{print $NF}' /tmp/changed-skills.txt | sed 's/-metadata\.json//' | paste -sd ', ')
          git commit -m "chore: enrich metadata for ${NAMES}"
          git push origin ${{ github.event.pull_request.head.ref }}

      # -----------------------------------------------------------------------
      # Fork PR merge / direct push: commit enriched files straight to main.
      # -----------------------------------------------------------------------
      - name: Commit enriched files to main
        if: steps.changed.outputs.any == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS= read -r file; do
            git add "$file"
          done < /tmp/changed-skills.txt

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          NAMES=$(awk -F'/' '{print $NF}' /tmp/changed-skills.txt | sed 's/-metadata\.json//' | paste -sd ', ')
          git commit -m "chore: enrich metadata for ${NAMES}"
          git push origin main

      # -----------------------------------------------------------------------
      # Post enrichment results as a PR comment (PR events only).
      # -----------------------------------------------------------------------
      - name: Comment enrichment results on PR
        if: steps.changed.outputs.any == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const files = fs.readFileSync('/tmp/changed-skills.txt', 'utf8')
              .trim().split('\n').filter(Boolean);

            const skills = files.map(f => {
              try { return JSON.parse(fs.readFileSync(f, 'utf8')); }
              catch { return null; }
            }).filter(Boolean);

            if (!skills.length) {
              console.log('No enriched entries found to comment.');
              return;
            }

            const rows = skills.map(s => {
              const guard = s.agentguard_report_url
                ? `[View report](${s.agentguard_report_url})`
                : '⏳ pending';
              return [
                `**[${s.name}](${s.github_url})**`,
                (s.category ?? []).join(', '),
                `[@${s.owner.username}](${s.owner.profile_url})`,
                `\`${(s.latest_commit || 'n/a').slice(0, 7)}\``,
                guard,
              ].join(' | ');
            });

            const body = [
              '## Skill Enrichment Preview',
              '',
              'Skill | Category | Owner | Commit | AgentGuard',
              '------|----------|-------|--------|----------',
              ...rows,
              '',
              `*Evaluated at: ${skills[0]?.evaluated_at ?? 'unknown'}*`,
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
