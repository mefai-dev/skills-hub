name: Enrich Skill Metadata

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "skills/**-metadata.json"
  # Fallback for fork PRs: the commit-back step is skipped during the PR
  # (GitHub blocks write access to forks), so we re-enrich on merge instead.
  push:
    branches: [main]
    paths:
      - "skills/**-metadata.json"

jobs:
  enrich:
    name: Enrich & Validate Skills
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit enriched files back to the PR branch
      pull-requests: write  # needed to post PR comments

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------------------------------------------------------
      # Detect which *-metadata.json files were added or changed in this PR.
      # Result is stored as a newline-delimited list in a temp file to avoid
      # passing user-controlled data through $GITHUB_OUTPUT into shell commands.
      # -----------------------------------------------------------------------
      - name: Detect changed skill files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep 'skills/.*-metadata\.json' || true)
          else
            # push to main (fork PR merge fallback)
            FILES=$(git diff --name-only HEAD~1 HEAD \
              | grep 'skills/.*-metadata\.json' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No skill submission files changed."
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$FILES"
            # Write to a temp file — never interpolated into shell or JS
            echo "$FILES" > /tmp/changed-skills.txt
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Run enrichment script — writes results back into each submission file.
      # Files are read from the temp file, never from an interpolated variable.
      # -----------------------------------------------------------------------
      - name: Enrich skill metadata
        id: enrich
        if: steps.changed.outputs.any == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTGUARD_API_KEY: ${{ secrets.AGENTGUARD_API_KEY }}
        run: |
          while IFS= read -r file; do
            echo "::group::Processing $file"
            node scripts/enrich-skill.js "$file"
            echo "::endgroup::"
          done < /tmp/changed-skills.txt

      # -----------------------------------------------------------------------
      # Commit enriched files back to the PR branch (same-repo PRs only).
      # Fork PRs skip this — the preview comment still posts below.
      # -----------------------------------------------------------------------
      - name: Commit enriched files to PR branch
        if: steps.changed.outputs.any == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS= read -r file; do
            git add "$file"
          done < /tmp/changed-skills.txt

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          NAMES=$(awk -F'/' '{print $NF}' /tmp/changed-skills.txt | sed 's/-metadata\.json//' | paste -sd ', ')
          git commit -m "chore: enrich metadata for ${NAMES}"
          git push origin ${{ github.head_ref }}

      - name: Commit enriched files to main (fork PR merge fallback)
        if: steps.changed.outputs.any == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS= read -r file; do
            git add "$file"
          done < /tmp/changed-skills.txt

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          NAMES=$(awk -F'/' '{print $NF}' /tmp/changed-skills.txt | sed 's/-metadata\.json//' | paste -sd ', ')
          git commit -m "chore: enrich metadata for ${NAMES}"
          git push origin main

      # -----------------------------------------------------------------------
      # Post enrichment results as a PR comment.
      # All dynamic data is passed via env vars — never inlined into JS.
      # -----------------------------------------------------------------------
      - name: Comment enrichment results on PR
        if: steps.changed.outputs.any == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ join(fromJSON(toJSON(steps.enrich.outputs)), '') }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        with:
          script: |
            const fs = require('fs');

            const files = fs.readFileSync('/tmp/changed-skills.txt', 'utf8')
              .trim().split('\n').filter(Boolean);

            const skills = files.map(f => {
              try { return JSON.parse(fs.readFileSync(f, 'utf8')); }
              catch { return null; }
            }).filter(Boolean);

            if (!skills.length) {
              console.log('No enriched entries found to comment.');
              return;
            }

            const isFork = process.env.IS_FORK === 'true';

            const rows = skills.map(s => {
              const guard = s.agentguard_report_url
                ? `[View report](${s.agentguard_report_url})`
                : '⏳ pending';
              return [
                `**[${s.name}](${s.github_url})**`,
                (s.category ?? []).join(', '),
                `[@${s.owner.username}](${s.owner.profile_url})`,
                `\`${(s.latest_commit || 'n/a').slice(0, 7)}\``,
                guard,
              ].join(' | ');
            });

            const forkNote = isFork
              ? '\n\n> **Note:** This PR is from a fork. Enriched data has not been committed to the branch — a maintainer will apply it on merge.'
              : '';

            const body = [
              '## Skill Enrichment Preview',
              '',
              'Skill | Category | Owner | Commit | AgentGuard',
              '------|----------|-------|--------|----------',
              ...rows,
              '',
              `*Evaluated at: ${skills[0]?.evaluated_at ?? 'unknown'}*`,
              forkNote,
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
